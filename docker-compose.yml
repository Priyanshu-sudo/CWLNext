services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mycwlnext
      POSTGRES_USER: mycwl
      POSTGRES_PASSWORD: mycwl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycwl -d mycwlnext"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://mycwl:mycwl@db:5432/mycwlnext
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8001/api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
